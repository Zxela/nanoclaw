global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'nanoclaw'

scrape_configs:
  - job_name: 'nanoclaw-agent'
    static_configs:
      - targets: ['agent-runner:9090']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
